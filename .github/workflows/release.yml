name: release

on:
  workflow_dispatch:
    inputs:
      increment:
        type: choice
        description: 'Tipo de incremento: patch, minor, major, prepatch, preminor, premajor ou prerelease'
        required: true
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
        default: 'patch'
      preRelease:
        type: string
        description: 'Tag de pré-lançamento (ex: alpha, beta, rc). Deixe vazio para versões estáveis.'
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PERSONAL_TOKEN }}

      - name: Setup GIT
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Node
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 24.15.0

      - name: Get npm cache directory
        id: npm-cache
        run: |
          echo "::set-output name=dir::$(npm config get cache)"
      - name: Setup npm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.npm-cache.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm ci || npm install
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Release
        run: |
          RELEASE_ARGS="--increment ${{ github.event.inputs.increment }}"
          if [ -n "${{ github.event.inputs.preRelease }}" ]; then
            RELEASE_ARGS="$RELEASE_ARGS --preRelease ${{ github.event.inputs.preRelease }}"
          fi
          npx release-it $RELEASE_ARGS
